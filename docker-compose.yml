version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: studypass_db
    environment:
      POSTGRES_USER: studypass
      POSTGRES_PASSWORD: studypass
      POSTGRES_DB: studypass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studypass"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studypass_api
    environment:
      DATABASE_URL: postgresql://studypass:studypass@postgres:5432/studypass
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
